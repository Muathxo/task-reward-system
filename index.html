<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Task Reward System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
}

body {
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    color: white;
    min-height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 80px);
}

/* PANELS */
.panel {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
}

.left {
    border-right: 2px solid rgba(255,255,255,0.1);
}

/* GLASS BOX */
.box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

/* TASK CARD */
.task {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 8px 12px;
    background: gold;
    color: black;
    border-radius: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
💎 Luxury Task Reward System
</header>

<div class="container">

<!-- PARENTS -->
<div class="panel left">
    <div class="box">
        <h2>👨‍👩‍👧 Parent Dashboard</h2>

        <input id="task" placeholder="Enter task">
        <input id="points" type="number" placeholder="Points">

        <button onclick="addTask()">Add Task</button>
    </div>

    <div class="box">
        <h3>All Tasks</h3>
        <div id="parentList"></div>
    </div>
</div>

<!-- KIDS -->
<div class="panel right">
    <div class="box">
        <h2>🧒 Kid Dashboard</h2>
        <h3>Points: <span id="score">0</span> ⭐</h3>
        <div id="badge"></div>
    </div>

    <div class="box">
        <h3>Tasks</h3>
        <div id="childList"></div>
    </div>

    <div class="box">
        <h3>Upload Proof</h3>
        <input type="file" accept="image/*" capture="environment">
        <button onclick="alert('Proof sent ✔')">Upload</button>
    </div>
</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let score = JSON.parse(localStorage.getItem("score")) || 0;

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
    localStorage.setItem("score", JSON.stringify(score));
    render();
}

function addTask(){
    let t = document.getElementById("task").value;
    let p = document.getElementById("points").value;

    if(!t || !p) return;

    tasks.push({t, p, done:false});
    save();
}

function complete(i){
    if(!tasks[i].done){
        tasks[i].done = true;
        score += Number(tasks[i].p);
        save();
    }
}

function render(){
    let parent = document.getElementById("parentList");
    let child = document.getElementById("childList");

    parent.innerHTML = "";
    child.innerHTML = "";

    tasks.forEach((x,i)=>{
        parent.innerHTML += `
            <div class="task">
                ${x.t} - ${x.p} ⭐
                <div>Status: ${x.done ? "Done" : "Pending"}</div>
            </div>
        `;

        child.innerHTML += `
            <div class="task">
                ${x.t} - ${x.p} ⭐
                <button onclick="complete(${i})">Complete</button>
            </div>
        `;
    });

    document.getElementById("score").innerText = score;

    let badge = "🥉 Beginner";
    if(score > 50) badge = "🏆 Luxury Master";
    else if(score > 20) badge = "🥈 Active";

    document.getElementById("badge").innerHTML = `<div class="badge">${badge}</div>`;
}

render();
</script>

</body>
</html>
