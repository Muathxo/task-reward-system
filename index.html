<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Task Reward System</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #1e1e2f, #2b5876);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #00c853;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.task {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    background: gold;
    color: black;
    border-radius: 6px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
🔥 Smart Task Reward System - GOD MODE
</header>

<div class="container">

<!-- PARENT -->
<div class="box">
<h2>Parent Panel</h2>

<input id="task" placeholder="Task name">
<input id="points" type="number" placeholder="Points">

<button onclick="addTask()">Add Task</button>

<div id="parentList"></div>
</div>

<!-- CHILD -->
<div class="box">
<h2>Child Panel</h2>

<div id="childList"></div>

<h3>Upload Proof</h3>
<input type="file" accept="image/*" capture="environment" id="file">
<button onclick="upload()">Upload</button>

<h3>Points: <span id="score">0</span> ⭐</h3>

<div id="badge"></div>
</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let score = JSON.parse(localStorage.getItem("score")) || 0;

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
    localStorage.setItem("score", JSON.stringify(score));
    render();
}

function addTask(){
    let t = document.getElementById("task").value;
    let p = document.getElementById("points").value;

    if(!t || !p) return;

    tasks.push({t, p, done:false});
    save();
}

function complete(i){
    if(!tasks[i].done){
        tasks[i].done = true;
        score += Number(tasks[i].p);
        save();
    }
}

function upload(){
    let f = document.getElementById("file").files[0];
    if(!f) return alert("No image selected!");

    alert("Proof uploaded ✔ GOD MODE ACTIVE");
}

function render(){
    let parent = document.getElementById("parentList");
    let child = document.getElementById("childList");

    parent.innerHTML = "";
    child.innerHTML = "";

    tasks.forEach((x,i)=>{
        parent.innerHTML += `
        <div class="task">
        ${x.t} - ${x.p} ⭐
        <div>Status: ${x.done ? "Done" : "Pending"}</div>
        </div>`;

        child.innerHTML += `
        <div class="task">
        ${x.t} - ${x.p} ⭐
        <button onclick="complete(${i})">Complete</button>
        </div>`;
    });

    document.getElementById("score").innerText = score;

    let badge = "";
    if(score > 50) badge = "🏆 Pro User";
    else if(score > 20) badge = "🥈 Active User";
    else badge = "🥉 Beginner";

    document.getElementById("badge").innerHTML = `<span class="badge">${badge}</span>`;
}

render();
</script>

</body>
</html>
